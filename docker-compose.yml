version: '3.9'
services:
  mongo:
    image: mongo:7.0
    container_name: sga_mongo
    restart: unless-stopped
    environment: { MONGO_INITDB_DATABASE: solvagence_academy }
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s; timeout: 5s; retries: 5

  api:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: sga_api
    restart: unless-stopped
    depends_on: { mongo: { condition: service_healthy } }
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/solvagence_academy
    ports: ["5000:5000"]
    volumes: [api_logs:/app/logs]
    healthcheck:
      test: ["CMD","wget","--quiet","--tries=1","--spider","http://localhost:5000/health"]
      interval: 15s; timeout: 5s; retries: 3; start_period: 10s

  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args: { VITE_API_BASE_URL: /api/v1 }
    container_name: sga_client
    restart: unless-stopped
    depends_on: [api]
    ports: ["3000:80"]

volumes: { mongo_data: {}, api_logs: {} }
